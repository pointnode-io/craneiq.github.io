<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&amp;display=swap');
      .crane{font-family:'Open Sans',sans-serif;font-weight:300;font-size:42px;fill:#c4d8e8;letter-spacing:-0.01em}
      .iq{font-family:'Open Sans',sans-serif;font-weight:600;font-size:42px;fill:#cc7700;letter-spacing:-0.01em}
      .pname{font-family:'Open Sans',sans-serif;font-weight:400;font-size:13px;fill:#cc7700;letter-spacing:0.06em;text-transform:uppercase}
    </style>
  </defs>
  <!-- Product icon box -->
  <rect x="0" y="4" width="64" height="64" rx="8" fill="#cc770012" stroke="#cc770030" stroke-width="1"/>
  <g transform="translate(16, 20) scale(2)">
    <svg viewBox="0 0 32 32" width="32" height="32">
      <line x1="16" y1="3" x2="16" y2="10" stroke="#cc7700" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="6" y1="3" x2="26" y2="3" stroke="#cc7700" stroke-width="1.8" stroke-linecap="round" opacity=".4"/>
      <path d="M16 10 Q24 18 20 26" stroke="#cc7700" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <path d="M16 10 Q8 18 12 26" stroke="#cc7700" stroke-width="1.1" fill="none" stroke-linecap="round" opacity=".45" stroke-dasharray="2 2"/>
      <circle cx="20" cy="26" r="2.5" stroke="#cc7700" stroke-width="1.3" fill="#cc770033"/>
    </svg>
  </g>
  <!-- Wordmark -->
  <text x="80" y="46"><tspan class="crane">crane</tspan><tspan class="iq">IQ</tspan></text>
  <text x="81" y="62" class="pname">Antisway</text>
  <!-- Accent line -->
  <line x1="80" y1="50" x2="310" y2="50" stroke="#cc7700" stroke-width="0.5" opacity="0.2"/>
</svg>