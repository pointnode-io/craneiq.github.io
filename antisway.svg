      .crane{font-family:'Open Sans',sans-serif;font-weight:300;font-size:42px;fill:#c4d8e8;letter-spacing:-0.01em}
      .iq{font-family:'Open Sans',sans-serif;font-weight:600;font-size:42px;fill:#cc9900;letter-spacing:-0.01em}
      .pname{font-family:'Open Sans',sans-serif;font-weight:400;font-size:13px;fill:#cc9900;letter-spacing:0.06em;text-transform:uppercase}
    </style>
  </defs>
  <!-- Product icon box -->
  <rect x="0" y="4" width="64" height="64" rx="8" fill="#cc990012" stroke="#cc990030" stroke-width="1"/>
  <g transform="translate(16, 20) scale(2)">
    <svg viewBox="0 0 32 32" width="32" height="32">
      <line x1="4" y1="9" x2="28" y2="9" stroke="#cc9900" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="16" y1="5" x2="16" y2="9" stroke="#cc9900" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M4 9 C4 9, 2 16, 7 18 C11 20, 13 18, 13 18 C13 18, 15 15, 13 9" stroke="#cc9900" stroke-width="1.2" fill="none" opacity=".8"/>
