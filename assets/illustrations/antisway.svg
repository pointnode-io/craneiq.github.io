  <!-- Vertical guide dashed -->
  <line x1="640" y1="118" x2="640" y2="402" stroke="#008B9A" stroke-width="1" stroke-dasharray="3 6" opacity="0.25"/>
  <!-- Crosshair at end of rope — centred, teal, glowing -->
  <g filter="url(#glows)">
    <circle cx="640" cy="285" r="16" fill="none" stroke="#008B9A" stroke-width="2.5" opacity="0.95"/>
    <circle cx="640" cy="285" r="5" fill="#008B9A" opacity="0.9"/>
    <line x1="614" y1="285" x2="624" y2="285" stroke="#008B9A" stroke-width="2.2"/>
    <line x1="656" y1="285" x2="666" y2="285" stroke="#008B9A" stroke-width="2.2"/>
    <line x1="640" y1="259" x2="640" y2="269" stroke="#008B9A" stroke-width="2.2"/>
    <line x1="640" y1="301" x2="640" y2="311" stroke="#008B9A" stroke-width="2.2"/>
  </g>
  <!-- Load box right -->
  <rect x="603" y="302" width="74" height="58" rx="3" fill="#071a15" stroke="#008B9A" stroke-width="1.8"/>
  <rect x="611" y="310" width="58" height="42" rx="2" fill="#0e1d2c"/>
  <ellipse cx="640" cy="363" rx="38" ry="6" fill="#000" opacity="0.3"/>
