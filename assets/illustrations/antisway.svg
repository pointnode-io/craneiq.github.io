    <line x1="670" y1="100" x2="690" y2="120" stroke="#020406" stroke-width="7"/><line x1="700" y1="100" x2="720" y2="120" stroke="#020406" stroke-width="7"/>
    <line x1="730" y1="100" x2="750" y2="120" stroke="#020406" stroke-width="7"/><line x1="760" y1="100" x2="780" y2="120" stroke="#020406" stroke-width="7"/>
    <line x1="790" y1="100" x2="810" y2="120" stroke="#020406" stroke-width="7"/><line x1="820" y1="100" x2="840" y2="120" stroke="#020406" stroke-width="7"/>
  </g>
