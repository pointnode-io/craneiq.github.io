    <line x1="160" y1="100" x2="180" y2="120" stroke="#020406" stroke-width="7"/><line x1="190" y1="100" x2="210" y2="120" stroke="#020406" stroke-width="7"/>
    <line x1="220" y1="100" x2="240" y2="120" stroke="#020406" stroke-width="7"/><line x1="250" y1="100" x2="270" y2="120" stroke="#020406" stroke-width="7"/>
    <line x1="280" y1="100" x2="300" y2="120" stroke="#020406" stroke-width="7"/><line x1="310" y1="100" x2="330" y2="120" stroke="#020406" stroke-width="7"/>
