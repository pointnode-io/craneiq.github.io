  <rect x="898" y="155" width="24" height="18" rx="2" fill="#cc3344" filter="url(#gs)"/>
  <text x="910" y="167" text-anchor="middle" fill="#fff" font-size="5.5" font-weight="bold">ZONE</text>
  <!-- Zone boundary dashed line from carriage -->
  <line x1="898" y1="164" x2="860" y2="164" stroke="#cc3344" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- Callout line -->
  <line x1="922" y1="164" x2="960" y2="258"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Callout box -->
  <rect x="812" y="258" width="168" height="52" rx="4" fill="#1a0007" stroke="#cc3344" stroke-width="1.8"/>
  <rect x="812" y="258" width="168" height="4" rx="2" fill="#cc3344"/>
  <text x="828" y="276" fill="#e4f0f8" font-size="11" font-weight="bold">craneIQ Zoning</text>
  <text x="828" y="289" fill="#3a5a78" font-size="8">Software-defined no-fly zones</text>
  <text x="828" y="299" fill="#3a5a78" font-size="8">Multi-crane collision prevention</text>

  <!-- 6. AUTOMATION — on pendant / control -->
  <!-- Automation indicator on pendant -->
  <rect x="372" y="500" width="24" height="8" rx="2" fill="#4488cc" filter="url(#gs)"/>
  <!-- Callout line -->
  <line x1="372" y1="504" x2="244" y2="400"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Callout box -->
