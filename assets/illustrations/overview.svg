<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="'Share Tech Mono','Courier New',monospace">
  <defs>
    <pattern id="og" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#008B9A" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gs"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="al" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#628098"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="#020406"/>
  <rect width="1000" height="620" fill="url(#og)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#e4f0f8" font-size="18" font-weight="bold" letter-spacing="3">craneIQ</text>
  <text x="500" y="56" text-anchor="middle" fill="#3a5a78" font-size="9" letter-spacing="4">COMPLETE CRANE INTELLIGENCE · ANY CRANE · ANY MANUFACTURER · NO LOCK-IN</text>

  <!-- ══════════════════════════════════════════
       CRANE STRUCTURE — front/slightly 3/4 view
       ══════════════════════════════════════════ -->

  <!-- Runway rails (two parallel) -->
  <rect x="80"  y="130" width="840" height="16" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
  <rect x="80"  y="182" width="840" height="16" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>

  <!-- Runway hazard stripes -->
  <clipPath id="r1"><rect x="80" y="130" width="840" height="16" rx="3"/></clipPath>
  <g clip-path="url(#r1)" opacity="0.18">
    <line x1="80" y1="130" x2="100" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="108" y1="130" x2="128" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="136" y1="130" x2="156" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="164" y1="130" x2="184" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="192" y1="130" x2="212" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="220" y1="130" x2="240" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="248" y1="130" x2="268" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="276" y1="130" x2="296" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="304" y1="130" x2="324" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="332" y1="130" x2="352" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="360" y1="130" x2="380" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="388" y1="130" x2="408" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="416" y1="130" x2="436" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="444" y1="130" x2="464" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="472" y1="130" x2="492" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="500" y1="130" x2="520" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="528" y1="130" x2="548" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="556" y1="130" x2="576" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="584" y1="130" x2="604" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="612" y1="130" x2="632" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="640" y1="130" x2="660" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="668" y1="130" x2="688" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="696" y1="130" x2="716" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="724" y1="130" x2="744" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="752" y1="130" x2="772" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="780" y1="130" x2="800" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="808" y1="130" x2="828" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="836" y1="130" x2="856" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="864" y1="130" x2="884" y2="146" stroke="#020406" stroke-width="7"/>
    <line x1="892" y1="130" x2="912" y2="146" stroke="#020406" stroke-width="7"/>
  </g>

  <!-- End carriages -->
  <rect x="72"  y="112" width="36" height="100" rx="4" fill="#F5C518" stroke="#D4A017" stroke-width="2"/>
  <rect x="892" y="112" width="36" height="100" rx="4" fill="#F5C518" stroke="#D4A017" stroke-width="2"/>
  <!-- Carriage wheels -->
  <circle cx="90"  cy="112" r="8" fill="#D4A017"/>
  <circle cx="90"  cy="212" r="8" fill="#D4A017"/>
  <circle cx="910" cy="112" r="8" fill="#D4A017"/>
  <circle cx="910" cy="212" r="8" fill="#D4A017"/>

  <!-- Bridge beam — main horizontal -->
  <rect x="108" y="148" width="784" height="34" rx="5" fill="#F5C518" stroke="#D4A017" stroke-width="2"/>
  <!-- Bridge detail — stiffeners -->
  <line x1="200" y1="148" x2="200" y2="182" stroke="#D4A017" stroke-width="1.5" opacity="0.4"/>
  <line x1="350" y1="148" x2="350" y2="182" stroke="#D4A017" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="148" x2="500" y2="182" stroke="#D4A017" stroke-width="1.5" opacity="0.4"/>
  <line x1="650" y1="148" x2="650" y2="182" stroke="#D4A017" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="148" x2="800" y2="182" stroke="#D4A017" stroke-width="1.5" opacity="0.4"/>

  <!-- Trolley -->
  <rect x="440" y="140" width="120" height="44" rx="5" fill="#F5C518" stroke="#D4A017" stroke-width="2"/>
  <!-- Trolley wheels on bridge -->
  <circle cx="458" cy="140" r="7" fill="#D4A017"/>
  <circle cx="542" cy="140" r="7" fill="#D4A017"/>

  <!-- Hoist drum on trolley -->
  <rect x="456" y="150" width="88" height="26" rx="4" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
  <ellipse cx="500" cy="163" rx="10" ry="12" fill="#B8860B"/>
  <ellipse cx="500" cy="163" rx="6" ry="8" fill="#D4A017"/>

  <!-- Hoist rope -->
  <line x1="500" y1="184" x2="500" y2="360" stroke="#92b0c4" stroke-width="3" stroke-linecap="round"/>

  <!-- Load crosshair target -->
  <g filter="url(#gs)">
    <circle cx="500" cy="366" r="18" fill="none" stroke="#008B9A" stroke-width="2.5"/>
    <circle cx="500" cy="366" r="6"  fill="#008B9A" opacity="0.85"/>
    <line x1="472" y1="366" x2="482" y2="366" stroke="#008B9A" stroke-width="2.2"/>
    <line x1="518" y1="366" x2="528" y2="366" stroke="#008B9A" stroke-width="2.2"/>
    <line x1="500" y1="338" x2="500" y2="348" stroke="#008B9A" stroke-width="2.2"/>
    <line x1="500" y1="384" x2="500" y2="394" stroke="#008B9A" stroke-width="2.2"/>
  </g>

  <!-- Load box -->
  <rect x="458" y="385" width="84" height="64" rx="4" fill="#0b1722" stroke="#008B9A" stroke-width="1.8"/>
  <rect x="466" y="393" width="68" height="48" rx="3" fill="#07101a"/>
  <ellipse cx="500" cy="452" rx="44" ry="7" fill="#000" opacity="0.4"/>

  <!-- Control pendant cable + pendant -->
  <line x1="390" y1="165" x2="390" y2="480" stroke="#628098" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="372" y="480" width="36" height="60" rx="5" fill="#0b1722" stroke="#628098" stroke-width="1.5"/>
  <rect x="378" y="488" width="24" height="8" rx="2" fill="#162840"/>
  <rect x="378" y="500" width="24" height="8" rx="2" fill="#162840"/>
  <rect x="378" y="512" width="24" height="8" rx="2" fill="#162840"/>
  <rect x="378" y="524" width="24" height="8" rx="2" fill="#162840"/>

  <!-- ══════════════════════════════════════════
       PRODUCT CALLOUT BOXES
       ══════════════════════════════════════════ -->

  <!-- Helper: callout line macro (inline) -->

  <!-- 1. CORE — on the trolley/control box -->
  <!-- Core unit on trolley -->
  <rect x="456" y="152" width="30" height="18" rx="2" fill="#008B9A" filter="url(#gs)"/>
  <text x="471" y="164" text-anchor="middle" fill="#020406" font-size="6" font-weight="bold">IQ</text>
  <!-- Callout line -->
  <line x1="486" y1="161" x2="580" y2="80"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Callout box -->
  <rect x="580" y="44" width="168" height="52" rx="4" fill="#071a15" stroke="#008B9A" stroke-width="1.8"/>
  <rect x="580" y="44" width="168" height="4" rx="2" fill="#008B9A"/>
  <text x="596" y="62" fill="#e4f0f8" font-size="11" font-weight="bold">craneIQ Core</text>
  <text x="596" y="75" fill="#3a5a78" font-size="8">Hoist controller · DWP · Load</text>
  <text x="596" y="85" fill="#3a5a78" font-size="8">spectrum · Overload protection</text>

  <!-- 2. ANTISWAY — VFDs on end carriage left -->
  <!-- VFD unit on left carriage -->
  <rect x="78" y="155" width="24" height="18" rx="2" fill="#cc7700" filter="url(#gs)"/>
  <text x="90" y="167" text-anchor="middle" fill="#020406" font-size="6" font-weight="bold">VFD</text>
  <!-- Callout line -->
  <line x1="78" y1="164" x2="44" y2="258"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Callout box -->
  <rect x="20" y="258" width="168" height="52" rx="4" fill="#1a0f00" stroke="#cc7700" stroke-width="1.8"/>
  <rect x="20" y="258" width="168" height="4" rx="2" fill="#cc7700"/>
  <text x="36" y="276" fill="#e4f0f8" font-size="11" font-weight="bold">craneIQ Antisway</text>
  <text x="36" y="289" fill="#3a5a78" font-size="8">No sensors · No encoders</text>
  <text x="36" y="299" fill="#3a5a78" font-size="8">Uses existing VFDs only</text>

  <!-- 3. MONITORING — standalone unit on bridge -->
  <!-- Monitoring unit on bridge -->
  <rect x="300" y="152" width="30" height="18" rx="2" fill="#8855dd" filter="url(#gs)"/>
  <text x="315" y="164" text-anchor="middle" fill="#fff" font-size="6" font-weight="bold">MON</text>
  <!-- Callout line -->
  <line x1="300" y1="161" x2="200" y2="88"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Callout box -->
  <rect x="20" y="44" width="168" height="52" rx="4" fill="#120a1f" stroke="#8855dd" stroke-width="1.8"/>
  <rect x="20" y="44" width="168" height="4" rx="2" fill="#8855dd"/>
  <text x="36" y="62" fill="#e4f0f8" font-size="11" font-weight="bold">craneIQ Monitoring</text>
  <text x="36" y="75" fill="#3a5a78" font-size="8">Standalone · Zero risk · DWP</text>
  <text x="36" y="85" fill="#3a5a78" font-size="8">Brake · Motor · Vibration</text>

  <!-- 4. VISION — camera on bridge + target on rope -->
  <!-- Camera on bridge -->
  <rect x="620" y="148" width="26" height="20" rx="3" fill="#009966" filter="url(#gs)"/>
  <circle cx="622" cy="158" r="6" fill="#020406" stroke="#009966" stroke-width="1.5"/>
  <circle cx="622" cy="158" r="3" fill="#009966" opacity="0.8"/>
  <!-- Callout line -->
  <line x1="646" y1="158" x2="760" y2="90"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Callout box -->
  <rect x="760" y="54" width="168" height="52" rx="4" fill="#001a0f" stroke="#009966" stroke-width="1.8"/>
  <rect x="760" y="54" width="168" height="4" rx="2" fill="#009966"/>
  <text x="776" y="72" fill="#e4f0f8" font-size="11" font-weight="bold">craneIQ Vision</text>
  <text x="776" y="85" fill="#3a5a78" font-size="8">Camera on crane · Passive target</text>
  <text x="776" y="95" fill="#3a5a78" font-size="8">Side pull &amp; snag prevention</text>

  <!-- 5. ZONING — laser on right end carriage -->
