  <rect x="20" y="340" width="168" height="4" rx="2" fill="#4488cc"/>
  <text x="36" y="358" fill="#e4f0f8" font-size="11" font-weight="bold">craneIQ Automation</text>
  <text x="36" y="371" fill="#3a5a78" font-size="8">Teach &amp; replay · No code</text>
  <text x="36" y="381" fill="#3a5a78" font-size="8">Any operator · Commissions in 1 day</text>

  <!-- 7. LOADTRACK — load cell on hoist / display -->
  <!-- LoadTrack unit on hoist -->
  <rect x="540" y="152" width="30" height="18" rx="2" fill="#cc9900" filter="url(#gs)"/>
  <text x="555" y="164" text-anchor="middle" fill="#020406" font-size="5.5" font-weight="bold">LOAD</text>
  <!-- Display unit on wall (right side, floor level) -->
  <rect x="820" y="420" width="56" height="36" rx="4" fill="#0b1722" stroke="#cc9900" stroke-width="1.8"/>
  <rect x="826" y="426" width="44" height="24" rx="2" fill="#07101a"/>
  <text x="848" y="438" text-anchor="middle" fill="#cc9900" font-size="7">LOAD</text>
  <text x="848" y="449" text-anchor="middle" fill="#e4f0f8" font-size="10" font-weight="bold">4.2 t</text>
  <!-- Wireless signal from hoist to display -->
  <line x1="820" y1="438" x2="650" y2="300" stroke="#cc9900" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Callout line from LoadTrack unit -->
  <line x1="570" y1="152" x2="680" y2="80"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Callout box -->
  <rect x="680" y="44" width="70" height="52" rx="4" fill="#1a0f00" stroke="#cc9900" stroke-width="1.8"/>
  <rect x="680" y="44" width="70" height="4" rx="2" fill="#cc9900"/>
  <text x="715" y="62" text-anchor="middle" fill="#e4f0f8" font-size="9" font-weight="bold">LoadTrack</text>
  <text x="715" y="75" text-anchor="middle" fill="#3a5a78" font-size="7">Every lift</text>
  <text x="715" y="85" text-anchor="middle" fill="#3a5a78" font-size="7">logged</text>

  <!-- 8. CLOUD — signal rising from Core unit -->
  <!-- WiFi/signal arcs above crane -->
  <path d="M 490 120 Q 500 108 510 120" fill="none" stroke="#2299bb" stroke-width="2" opacity="0.7"/>
  <path d="M 480 112 Q 500  94 520 112" fill="none" stroke="#2299bb" stroke-width="1.5" opacity="0.5"/>
  <path d="M 470 104 Q 500  80 530 104" fill="none" stroke="#2299bb" stroke-width="1" opacity="0.3"/>
  <circle cx="500" cy="128" r="3" fill="#2299bb" opacity="0.8"/>
  <!-- Cloud callout line -->
  <line x1="530" y1="100" x2="640" y2="60"  stroke="#628098" stroke-width="1" marker-end="url(#al)" opacity="0.8"/>
  <!-- Cloud callout box -->
  <rect x="640" y="24" width="112" height="38" rx="4" fill="#001219" stroke="#2299bb" stroke-width="1.8"/>
  <rect x="640" y="24" width="112" height="4" rx="2" fill="#2299bb"/>
  <text x="696" y="40" text-anchor="middle" fill="#e4f0f8" font-size="9" font-weight="bold">craneIQ Cloud</text>
  <text x="696" y="53" text-anchor="middle" fill="#3a5a78" font-size="7">Live data · Alerts · Remote</text>

  <!-- ══════════════════════════════════════════
       BOTTOM STRIP — key message
       ══════════════════════════════════════════ -->
  <rect x="50" y="560" width="900" height="40" rx="4" fill="#07101a" stroke="#162840" stroke-width="1"/>
  <!-- 8 product dots -->
  <circle cx="120" cy="580" r="5" fill="#008B9A"/>
  <circle cx="185" cy="580" r="5" fill="#4488cc"/>
  <circle cx="250" cy="580" r="5" fill="#8855dd"/>
  <circle cx="315" cy="580" r="5" fill="#2299bb"/>
  <circle cx="380" cy="580" r="5" fill="#009966"/>
  <circle cx="445" cy="580" r="5" fill="#cc7700"/>
  <circle cx="510" cy="580" r="5" fill="#cc3344"/>
  <circle cx="575" cy="580" r="5" fill="#cc9900"/>
  <text x="610" y="584" fill="#3a5a78" font-size="8" letter-spacing="1">·</text>
  <text x="630" y="584" fill="#628098" font-size="8" letter-spacing="1.5">ALL PRODUCTS SIT ALONGSIDE EXISTING CONTROLS</text>
  <text x="630" y="594" fill="#3a5a78" font-size="7.5" letter-spacing="1">NO PROPRIETARY LOCK-IN · ANY CRANE · ANY MANUFACTURER · WORLDWIDE</text>
</svg>
