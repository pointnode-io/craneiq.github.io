<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'Open Sans',sans-serif">
<defs>
  <pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M32 0L0 0 0 32" fill="none" stroke="#cc3344" stroke-width="0.25" opacity="0.1"/>
  </pattern>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0 0 L6 3 L0 6 Z" fill="#008B9A"/>
  </marker>
</defs>
<rect width="860" height="420" fill="#020406"/>
<rect width="860" height="420" fill="url(#g)"/>

<text x="430" y="30" text-anchor="middle" fill="#c4d8e8" font-size="15" font-weight="600" letter-spacing="1">craneIQ Zoning</text>
<text x="430" y="46" text-anchor="middle" fill="#3a5a78" font-size="9" letter-spacing="3" font-family="'Share Tech Mono',monospace">SOFTWARE-DEFINED ZONES · UNLIMITED BOUNDARIES · AUTO DECELERATION &amp; STOP</text>

<!-- Factory floor — top-down -->
<rect x="40" y="64" width="780" height="310" rx="4" fill="#07101a" stroke="#162840" stroke-width="1.5"/>

