<rect x="726" y="66" width="82" height="306" fill="#cc3344" opacity="0.09" stroke="#cc3344" stroke-width="1.2" stroke-dasharray="5 3"/>
<text x="767" y="226" text-anchor="middle" fill="#cc3344" font-size="7.5" font-family="'Share Tech Mono',monospace" transform="rotate(-90,767,226)">BUILDING WALL</text>
<line x1="738" y1="70" x2="738" y2="370" stroke="#cc3344" stroke-width="0.5" opacity="0.3"/>
