<line x1="664" y1="64" x2="664" y2="374" stroke="#0e1d2c" stroke-width="1"/>

<!-- ZONE 1 — Machine no-fly -->
<rect x="58" y="280" width="152" height="80" rx="3" fill="#cc3344" opacity="0.07" stroke="#cc3344" stroke-width="1.2" stroke-dasharray="5 3"/>
<rect x="74" y="294" width="120" height="54" rx="2" fill="#0b1722" stroke="#3a5a78" stroke-width="1.2"/>
