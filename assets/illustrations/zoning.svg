<text x="134" y="272" text-anchor="middle" fill="#cc3344" font-size="7.5" letter-spacing="0.5" font-family="'Share Tech Mono',monospace">NO-FLY ZONE</text>
<text x="134" y="263" text-anchor="middle" fill="#cc3344" font-size="6.5" opacity="0.7" font-family="'Share Tech Mono',monospace">MACHINE CENTRE</text>

