<rect x="340" y="96" width="28" height="28" rx="2" fill="#cc3344" opacity="0.9" filter="url(#glow)"/>
<text x="354" y="114" text-anchor="middle" fill="#fff" font-size="7" font-weight="600" font-family="'Share Tech Mono',monospace">IQ</text>

