<text x="726" y="78" text-anchor="middle" fill="#cc3344" font-size="9" font-weight="600">3</text>

<!-- Crane rails top-down -->
<rect x="40" y="90" width="780" height="9" rx="2" fill="#D4A017" opacity="0.65"/>
<rect x="40" y="120" width="780" height="9" rx="2" fill="#D4A017" opacity="0.65"/>

<!-- Crane bridge top-down -->
