<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" font-family="'Share Tech Mono', 'Courier New', monospace">
  <defs>
    <pattern id="grid4" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#cc3344" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <filter id="gz"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gzs"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#008B9A"/>
    </marker>
  </defs>
  <rect width="700" height="460" fill="#020406"/>
  <rect width="700" height="460" fill="url(#grid4)"/>

  <text x="350" y="36" text-anchor="middle" fill="#e4f0f8" font-size="16" font-weight="bold" letter-spacing="2">craneIQ Zoning</text>
  <text x="350" y="54" text-anchor="middle" fill="#3a5a78" font-size="11.5" letter-spacing="3">SOFTWARE-DEFINED ZONES · UNLIMITED BOUNDARIES · AUTO DECELERATION &amp; STOP</text>

  <!-- Factory floor — top down view -->
  <rect x="50" y="70" width="600" height="350" rx="6" fill="#07101a" stroke="#162840" stroke-width="2"/>

  <!-- Floor grid -->
  <line x1="50" y1="140" x2="650" y2="140" stroke="#0e1d2c" stroke-width="1"/>
  <line x1="50" y1="210" x2="650" y2="210" stroke="#0e1d2c" stroke-width="1"/>
  <line x1="50" y1="280" x2="650" y2="280" stroke="#0e1d2c" stroke-width="1"/>
  <line x1="50" y1="350" x2="650" y2="350" stroke="#0e1d2c" stroke-width="1"/>
  <line x1="170" y1="70" x2="170" y2="420" stroke="#0e1d2c" stroke-width="1"/>
  <line x1="290" y1="70" x2="290" y2="420" stroke="#0e1d2c" stroke-width="1"/>
  <line x1="410" y1="70" x2="410" y2="420" stroke="#0e1d2c" stroke-width="1"/>
  <line x1="530" y1="70" x2="530" y2="420" stroke="#0e1d2c" stroke-width="1"/>

  <!-- ZONE 1: Machine no-fly -->
  <rect x="72" y="302" width="136" height="98" rx="4" fill="#cc3344" opacity="0.08" stroke="#cc3344" stroke-width="1.5" stroke-dasharray="6 3"/>
  <rect x="90" y="318" width="100" height="64" rx="3" fill="#0b1722" stroke="#3a5a78" stroke-width="1.5"/>
  <rect x="100" y="326" width="80" height="48" rx="2" fill="#07101a"/>
  <circle cx="140" cy="350" r="14" fill="#162840" stroke="#3a5a78" stroke-width="1"/>
  <circle cx="140" cy="350" r="6" fill="#3a5a78"/>
  <text x="140" y="295" text-anchor="middle" fill="#cc3344" font-size="13" letter-spacing="1">NO-FLY ZONE</text>
  <text x="140" y="284" text-anchor="middle" fill="#cc3344" font-size="12" opacity="0.7">MACHINE CENTRE</text>
  <circle cx="72" cy="279" r="10" fill="#cc3344" opacity="0.2" stroke="#cc3344" stroke-width="1.2"/>
  <text x="72" y="283" text-anchor="middle" fill="#cc3344" font-size="12.5" font-weight="bold">1</text>

  <!-- ZONE 2: Pedestrian walkway -->
  <rect x="446" y="72" width="58" height="348" rx="0" fill="#cc3344" opacity="0.07" stroke="#cc3344" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="456" y1="72" x2="456" y2="420" stroke="#cc3344" stroke-width="0.8" stroke-dasharray="10 6" opacity="0.4"/>
  <line x1="494" y1="72" x2="494" y2="420" stroke="#cc3344" stroke-width="0.8" stroke-dasharray="10 6" opacity="0.4"/>
  <!-- Person icon -->
  <circle cx="475" cy="248" r="6" fill="#3a5a78"/>
  <line x1="475" y1="254" x2="475" y2="274" stroke="#3a5a78" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="475" y1="260" x2="465" y2="270" stroke="#3a5a78" stroke-width="2" stroke-linecap="round"/>
  <line x1="475" y1="260" x2="485" y2="270" stroke="#3a5a78" stroke-width="2" stroke-linecap="round"/>
  <line x1="475" y1="274" x2="466" y2="288" stroke="#3a5a78" stroke-width="2" stroke-linecap="round"/>
  <line x1="475" y1="274" x2="484" y2="288" stroke="#3a5a78" stroke-width="2" stroke-linecap="round"/>
  <text x="475" y="176" text-anchor="middle" fill="#cc3344" font-size="13" letter-spacing="0.5" transform="rotate(-90,475,176)">PEDESTRIAN ZONE</text>
  <circle cx="446" cy="80" r="10" fill="#cc3344" opacity="0.2" stroke="#cc3344" stroke-width="1.2"/>
  <text x="446" y="84" text-anchor="middle" fill="#cc3344" font-size="12.5" font-weight="bold">2</text>

  <!-- ZONE 3: Building wall -->
  <rect x="584" y="72" width="66" height="348" rx="0" fill="#cc3344" opacity="0.1" stroke="#cc3344" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="617" y="258" text-anchor="middle" fill="#cc3344" font-size="12.5" letter-spacing="0.5" transform="rotate(-90,617,258)">BUILDING WALL</text>
  <line x1="594" y1="80" x2="594" y2="412" stroke="#cc3344" stroke-width="0.6" opacity="0.3"/>
  <line x1="610" y1="80" x2="610" y2="412" stroke="#cc3344" stroke-width="0.6" opacity="0.3"/>
  <line x1="626" y1="80" x2="626" y2="412" stroke="#cc3344" stroke-width="0.6" opacity="0.3"/>
  <circle cx="584" cy="80" r="10" fill="#cc3344" opacity="0.2" stroke="#cc3344" stroke-width="1.2"/>
  <text x="584" y="84" text-anchor="middle" fill="#cc3344" font-size="12.5" font-weight="bold">3</text>

  <!-- Crane runway rails — top down -->
  <rect x="50" y="98" width="600" height="8" rx="2" fill="#D4A017" opacity="0.7"/>
  <rect x="50" y="132" width="600" height="8" rx="2" fill="#D4A017" opacity="0.7"/>

  <!-- Crane bridge top-down -->
  <rect x="200" y="88" width="220" height="52" rx="5" fill="#F5C518" stroke="#D4A017" stroke-width="2"/>
  <rect x="210" y="96" width="200" height="36" rx="3" fill="#D4A017" opacity="0.3"/>
  <!-- Trolley top-down with crosshair target (load position) -->
  <rect x="293" y="92" width="34" height="44" rx="4" fill="#F5C518" stroke="#D4A017" stroke-width="1.5"/>
  <rect x="299" y="100" width="22" height="28" rx="3" fill="#cc3344" opacity="0.9" filter="url(#gzs)"/>
  <text x="310" y="117" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">IQ</text>

  <!-- Load crosshair (below crane, projected on floor) -->
  <g opacity="0.5">
    <circle cx="310" cy="195" r="12" fill="none" stroke="#008B9A" stroke-width="1.5" stroke-dasharray="3 2"/>
    <circle cx="310" cy="195" r="3.5" fill="#008B9A" opacity="0.6"/>
    <line x1="292" y1="195" x2="298" y2="195" stroke="#008B9A" stroke-width="1.2"/>
    <line x1="322" y1="195" x2="328" y2="195" stroke="#008B9A" stroke-width="1.2"/>
    <line x1="310" y1="177" x2="310" y2="183" stroke="#008B9A" stroke-width="1.2"/>
    <line x1="310" y1="207" x2="310" y2="213" stroke="#008B9A" stroke-width="1.2"/>
  </g>

  <!-- Travel arrow — crane approaching zone 2 -->
  <path d="M 420 114 L 500 114" fill="none" stroke="#008B9A" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Decel zone -->
  <rect x="424" y="78" width="16" height="44" rx="2" fill="#cc7700" opacity="0.2" stroke="#cc7700" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="432" y="70" text-anchor="middle" fill="#cc7700" font-size="12" letter-spacing="0.5">SLOW</text>
  <rect x="440" y="78" width="8" height="44" rx="1" fill="#cc3344" opacity="0.25" stroke="#cc3344" stroke-width="1"/>
  <text x="444" y="70" text-anchor="middle" fill="#cc3344" font-size="12">STOP</text>

  <!-- Status badges -->
  <rect x="56" y="436" width="130" height="16" rx="3" fill="#071a15" stroke="#cc3344" stroke-width="1"/>
  <text x="121" y="448" text-anchor="middle" fill="#cc3344" font-size="13" letter-spacing="1">3 ZONES ACTIVE</text>
  <rect x="276" y="428" width="148" height="24" rx="4" fill="#071a15" stroke="#cc3344" stroke-width="1.5"/>
  <circle cx="300" cy="440" r="6" fill="#cc3344" opacity="0.2"/>
  <text x="300" y="444" text-anchor="middle" fill="#4ccc80" font-size="12.5">✓</text>
  <text x="375" y="444" text-anchor="middle" fill="#e4f0f8" font-size="11.5" font-weight="bold">PROTECTION ACTIVE</text>
  <rect x="514" y="436" width="132" height="16" rx="3" fill="#071a15" stroke="#cc3344" stroke-width="1"/>
  <text x="580" y="448" text-anchor="middle" fill="#cc3344" font-size="13" letter-spacing="1">RESPONSE &lt;50ms</text>
</svg>
