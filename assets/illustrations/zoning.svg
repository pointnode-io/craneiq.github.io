<rect x="544" y="66" width="60" height="306" fill="#cc3344" opacity="0.06" stroke="#cc3344" stroke-width="1.2" stroke-dasharray="5 3"/>
<line x1="554" y1="66" x2="554" y2="372" stroke="#cc3344" stroke-width="0.7" stroke-dasharray="8 5" opacity="0.35"/>
