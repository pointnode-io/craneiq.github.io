<circle cx="354" cy="195" r="11" fill="none" stroke="#008B9A" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.45"/>
<circle cx="354" cy="195" r="3" fill="#008B9A" opacity="0.5"/>

<!-- Travel direction arrow -->
<line x1="480" y1="110" x2="558" y2="110" stroke="#008B9A" stroke-width="2" marker-end="url(#arr)"/>

<!-- Decel bands -->
<rect x="510" y="82" width="18" height="54" rx="2" fill="#cc7700" opacity="0.18" stroke="#cc7700" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="519" y="76" text-anchor="middle" fill="#cc7700" font-size="7.5" font-family="'Share Tech Mono',monospace">SLOW</text>
<rect x="528" y="82" width="10" height="54" rx="2" fill="#cc3344" opacity="0.22" stroke="#cc3344" stroke-width="0.8"/>
<text x="533" y="76" text-anchor="middle" fill="#cc3344" font-size="7.5" font-family="'Share Tech Mono',monospace">STOP</text>

<!-- Status badges -->
<rect x="40" y="386" width="120" height="18" rx="2" fill="#071a15" stroke="#cc3344" stroke-width="1"/>
<text x="100" y="399" text-anchor="middle" fill="#cc3344" font-size="8" letter-spacing="1" font-family="'Share Tech Mono',monospace">3 ZONES ACTIVE</text>
<rect x="310" y="382" width="240" height="26" rx="3" fill="#071a15" stroke="#cc3344" stroke-width="1.5"/>
<circle cx="334" cy="395" r="6" fill="#cc3344" opacity="0.15"/>
<text x="334" y="399" text-anchor="middle" fill="#4ccc80" font-size="9">✓</text>
<text x="430" y="399" text-anchor="middle" fill="#c4d8e8" font-size="10" font-weight="600">PROTECTION ACTIVE</text>
<rect x="700" y="386" width="120" height="18" rx="2" fill="#071a15" stroke="#cc3344" stroke-width="1"/>
<text x="760" y="399" text-anchor="middle" fill="#cc3344" font-size="8" letter-spacing="1" font-family="'Share Tech Mono',monospace">RESPONSE &lt;50ms</text>
</svg>
