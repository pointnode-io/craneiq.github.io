<circle cx="544" cy="74" r="9" fill="#cc3344" opacity="0.18" stroke="#cc3344" stroke-width="1"/>
<text x="544" y="78" text-anchor="middle" fill="#cc3344" font-size="9" font-weight="600">2</text>

