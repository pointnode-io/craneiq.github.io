<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" font-family="'Share Tech Mono', 'Courier New', monospace">
  <defs>
    <pattern id="grid3" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#009966" stroke-width="0.3" opacity="0.12"/>
    </pattern>
    <filter id="gv"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gvs"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="700" height="440" fill="#020406"/>
  <rect width="700" height="440" fill="url(#grid3)"/>
  <ellipse cx="350" cy="200" rx="200" ry="150" fill="#009966" opacity="0.03"/>

  <text x="350" y="38" text-anchor="middle" fill="#e4f0f8" font-size="16" font-weight="bold" letter-spacing="2">craneIQ Vision</text>
  <text x="350" y="56" text-anchor="middle" fill="#3a5a78" font-size="11.5" letter-spacing="3">CAMERA ON CRANE · PASSIVE TARGET ON HOOK · ANY REEVING ARRANGEMENT</text>

  <!-- Runway -->
  <rect x="80" y="88" width="540" height="22" rx="4" fill="#F5C518" stroke="#D4A017" stroke-width="2"/>
  <clipPath id="cvb"><rect x="80" y="88" width="540" height="22" rx="4"/></clipPath>
  <g clip-path="url(#cvb)" opacity="0.2">
    <line x1="80" y1="88" x2="104" y2="110" stroke="#020406" stroke-width="7"/><line x1="114" y1="88" x2="138" y2="110" stroke="#020406" stroke-width="7"/>
    <line x1="148" y1="88" x2="172" y2="110" stroke="#020406" stroke-width="7"/><line x1="182" y1="88" x2="206" y2="110" stroke="#020406" stroke-width="7"/>
    <line x1="216" y1="88" x2="240" y2="110" stroke="#020406" stroke-width="7"/><line x1="250" y1="88" x2="274" y2="110" stroke="#020406" stroke-width="7"/>
    <line x1="284" y1="88" x2="308" y2="110" stroke="#020406" stroke-width="7"/><line x1="318" y1="88" x2="342" y2="110" stroke="#020406" stroke-width="7"/>
    <line x1="352" y1="88" x2="376" y2="110" stroke="#020406" stroke-width="7"/><line x1="386" y1="88" x2="410" y2="110" stroke="#020406" stroke-width="7"/>
    <line x1="420" y1="88" x2="444" y2="110" stroke="#020406" stroke-width="7"/><line x1="454" y1="88" x2="478" y2="110" stroke="#020406" stroke-width="7"/>
    <line x1="488" y1="88" x2="512" y2="110" stroke="#020406" stroke-width="7"/><line x1="522" y1="88" x2="546" y2="110" stroke="#020406" stroke-width="7"/>
    <line x1="556" y1="88" x2="580" y2="110" stroke="#020406" stroke-width="7"/>
  </g>
  <rect x="76" y="76" width="11" height="46" rx="3" fill="#D4A017"/>
  <rect x="613" y="76" width="11" height="46" rx="3" fill="#D4A017"/>

  <!-- Trolley -->
  <rect x="295" y="70" width="110" height="30" rx="5" fill="#F5C518" stroke="#D4A017" stroke-width="2"/>
  <circle cx="313" cy="70" r="6" fill="#D4A017"/>
  <circle cx="387" cy="70" r="6" fill="#D4A017"/>
  <rect x="330" y="76" width="40" height="18" rx="3" fill="#009966" filter="url(#gvs)"/>
  <rect x="332" y="78" width="36" height="14" rx="2" fill="#006644"/>
  <text x="350" y="88" text-anchor="middle" fill="#4ccc80" font-size="11" font-weight="bold" letter-spacing="0.5">craneIQ</text>

  <!-- Camera on bridge -->
  <rect x="406" y="110" width="6" height="22" rx="2" fill="#D4A017"/>
  <rect x="392" y="130" width="36" height="22" rx="4" fill="#0b1722" stroke="#009966" stroke-width="2" filter="url(#gvs)"/>
  <circle cx="392" cy="141" r="8" fill="#07101a" stroke="#009966" stroke-width="1.5"/>
  <circle cx="392" cy="141" r="4.5" fill="#020406" stroke="#009966" stroke-width="1"/>
  <circle cx="392" cy="141" r="2" fill="#009966" opacity="0.8"/>
  <circle cx="389" cy="138" r="1" fill="#fff" opacity="0.4"/>
  <rect x="402" y="144" width="28" height="10" rx="2" fill="#162840" stroke="#009966" stroke-width="0.8"/>
  <text x="416" y="152" text-anchor="middle" fill="#009966" font-size="11.5" letter-spacing="0.5">IP67</text>

  <!-- Camera callout -->
  <line x1="428" y1="141" x2="488" y2="141" stroke="#009966" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
  <rect x="488" y="126" width="170" height="34" rx="4" fill="#071a15" stroke="#009966" stroke-width="1.5"/>
  <text x="573" y="141" text-anchor="middle" fill="#e4f0f8" font-size="12.5" font-weight="bold">Camera</text>
  <text x="573" y="153" text-anchor="middle" fill="#3a5a78" font-size="13">Mounted on crane structure</text>

  <!-- View cone -->
  <polygon points="392,152 308,305 490,305" fill="#009966" opacity="0.04"/>
  <line x1="392" y1="152" x2="308" y2="305" stroke="#009966" stroke-width="1" stroke-dasharray="5 4" opacity="0.3"/>
  <line x1="392" y1="152" x2="490" y2="305" stroke="#009966" stroke-width="1" stroke-dasharray="5 4" opacity="0.3"/>

  <!-- Hoist rope -->
  <line x1="350" y1="100" x2="350" y2="248" stroke="#92b0c4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Passive target on hook block — crosshair style, key element -->
  <g filter="url(#gv)">
    <!-- Target mount box -->
    <rect x="330" y="228" width="40" height="28" rx="3" fill="#009966" opacity="0.12" stroke="#009966" stroke-width="1.8"/>
    <!-- Crosshair target inside -->
    <circle cx="350" cy="242" r="10" fill="none" stroke="#009966" stroke-width="2"/>
    <circle cx="350" cy="242" r="3.5" fill="#009966" opacity="0.9"/>
    <line x1="332" y1="242" x2="340" y2="242" stroke="#009966" stroke-width="1.8"/>
    <line x1="360" y1="242" x2="368" y2="242" stroke="#009966" stroke-width="1.8"/>
    <line x1="350" y1="224" x2="350" y2="232" stroke="#009966" stroke-width="1.8"/>
    <line x1="350" y1="252" x2="350" y2="260" stroke="#009966" stroke-width="1.8"/>
  </g>

  <!-- Target callout -->
  <line x1="330" y1="242" x2="210" y2="234" stroke="#009966" stroke-width="1" stroke-dasharray="3 2" opacity="0.7"/>
  <rect x="38" y="214" width="172" height="48" rx="4" fill="#071a15" stroke="#009966" stroke-width="1.5"/>
  <rect x="38" y="214" width="172" height="4" rx="2" fill="#009966"/>
  <text x="124" y="231" text-anchor="middle" fill="#e4f0f8" font-size="12.5" font-weight="bold">Passive Target</text>
  <text x="124" y="244" text-anchor="middle" fill="#3a5a78" font-size="13">No electronics</text>
  <text x="124" y="255" text-anchor="middle" fill="#3a5a78" font-size="13">No moving parts · Any reeving</text>

  <!-- Load -->
  <rect x="305" y="268" width="90" height="64" rx="4" fill="#0b1722" stroke="#009966" stroke-width="1.5"/>
  <rect x="314" y="277" width="72" height="46" rx="3" fill="#07101a"/>
  <line x1="322" y1="268" x2="350" y2="257" stroke="#628098" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="378" y1="268" x2="350" y2="257" stroke="#628098" stroke-width="1.5" stroke-dasharray="3 2"/>
  <ellipse cx="350" cy="336" rx="48" ry="7" fill="#000" opacity="0.35"/>

  <!-- Detection status -->
  <rect x="198" y="358" width="304" height="36" rx="5" fill="#071a15" stroke="#009966" stroke-width="1.5"/>
  <rect x="198" y="358" width="304" height="3" rx="1" fill="#009966"/>
  <circle cx="224" cy="376" r="8" fill="#009966" opacity="0.15" stroke="#009966" stroke-width="1.2"/>
  <text x="224" y="381" text-anchor="middle" fill="#4ccc80" font-size="11">✓</text>
  <text x="360" y="373" text-anchor="middle" fill="#e4f0f8" font-size="12.5" font-weight="bold">HOOK POSITION: CENTRED</text>
  <text x="360" y="386" text-anchor="middle" fill="#009966" font-size="13" letter-spacing="1">SIDE PULL: NONE DETECTED</text>
</svg>
