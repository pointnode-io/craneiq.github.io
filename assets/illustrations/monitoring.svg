    <line x1="288" y1="88" x2="308" y2="108" stroke="#020406" stroke-width="6"/><line x1="316" y1="88" x2="336" y2="108" stroke="#020406" stroke-width="6"/>
    <line x1="344" y1="88" x2="364" y2="108" stroke="#020406" stroke-width="6"/><line x1="372" y1="88" x2="392" y2="108" stroke="#020406" stroke-width="6"/>
    <line x1="400" y1="88" x2="420" y2="108" stroke="#020406" stroke-width="6"/><line x1="428" y1="88" x2="448" y2="108" stroke="#020406" stroke-width="6"/>
