<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'Share Tech Mono', 'Courier New', monospace">
  <defs>
    <pattern id="grid2" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#008B9A" stroke-width="0.3" opacity="0.12"/>
    </pattern>
    <filter id="g2"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2s"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="700" height="420" fill="#020406"/>
