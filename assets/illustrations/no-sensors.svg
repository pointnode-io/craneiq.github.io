  <g clip-path="url(#cns)" opacity="0.2">
    <line x1="80" y1="90" x2="106" y2="114" stroke="#020406" stroke-width="8"/><line x1="116" y1="90" x2="142" y2="114" stroke="#020406" stroke-width="8"/>
    <line x1="152" y1="90" x2="178" y2="114" stroke="#020406" stroke-width="8"/><line x1="188" y1="90" x2="214" y2="114" stroke="#020406" stroke-width="8"/>
    <line x1="224" y1="90" x2="250" y2="114" stroke="#020406" stroke-width="8"/><line x1="260" y1="90" x2="286" y2="114" stroke="#020406" stroke-width="8"/>
    <line x1="296" y1="90" x2="322" y2="114" stroke="#020406" stroke-width="8"/><line x1="332" y1="90" x2="358" y2="114" stroke="#020406" stroke-width="8"/>
    <line x1="368" y1="90" x2="394" y2="114" stroke="#020406" stroke-width="8"/><line x1="404" y1="90" x2="430" y2="114" stroke="#020406" stroke-width="8"/>
    <line x1="440" y1="90" x2="466" y2="114" stroke="#020406" stroke-width="8"/><line x1="476" y1="90" x2="502" y2="114" stroke="#020406" stroke-width="8"/>
    <line x1="512" y1="90" x2="538" y2="114" stroke="#020406" stroke-width="8"/><line x1="548" y1="90" x2="574" y2="114" stroke="#020406" stroke-width="8"/>
    <line x1="584" y1="90" x2="610" y2="114" stroke="#020406" stroke-width="8"/>
  </g>
  <rect x="76" y="78" width="12" height="50" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
  <rect x="612" y="78" width="12" height="50" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>

