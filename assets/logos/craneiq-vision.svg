<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&amp;display=swap');
      .crane{font-family:'Open Sans',sans-serif;font-weight:300;font-size:42px;fill:#c4d8e8;letter-spacing:-0.01em}
      .iq{font-family:'Open Sans',sans-serif;font-weight:600;font-size:42px;fill:#009966;letter-spacing:-0.01em}
      .pname{font-family:'Open Sans',sans-serif;font-weight:400;font-size:13px;fill:#009966;letter-spacing:0.06em;text-transform:uppercase}
    </style>
  </defs>
  <!-- Product icon box -->
  <rect x="0" y="4" width="64" height="64" rx="8" fill="#00996612" stroke="#00996630" stroke-width="1"/>
  <g transform="translate(16, 20) scale(2)">
    <svg viewBox="0 0 32 32" width="32" height="32">
      <rect x="4" y="10" width="20" height="14" rx="2" stroke="#009966" stroke-width="1.4" fill="none"/>
      <path d="M24 13.5 L30 10.5 L30 22.5 L24 19.5" stroke="#009966" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
      <line x1="14" y1="11" x2="14" y2="23" stroke="#009966" stroke-width=".8" opacity=".45"/>
      <line x1="4" y1="17" x2="24" y2="17" stroke="#009966" stroke-width=".8" opacity=".45"/>
      <circle cx="14" cy="17" r="2.5" stroke="#009966" stroke-width="1.1" fill="none"/>
    </svg>
  </g>
  <!-- Wordmark -->
  <text x="80" y="46"><tspan class="crane">crane</tspan><tspan class="iq">IQ</tspan></text>
  <text x="81" y="62" class="pname">Vision</text>
  <!-- Accent line -->
  <line x1="80" y1="50" x2="310" y2="50" stroke="#009966" stroke-width="0.5" opacity="0.2"/>
</svg>