<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&amp;display=swap');
      .crane{font-family:'Open Sans',sans-serif;font-weight:300;font-size:42px;fill:#c4d8e8;letter-spacing:-0.01em}
      .iq{font-family:'Open Sans',sans-serif;font-weight:600;font-size:42px;fill:#008B9A;letter-spacing:-0.01em}
      .pname{font-family:'Open Sans',sans-serif;font-weight:400;font-size:13px;fill:#008B9A;letter-spacing:0.06em;text-transform:uppercase}
    </style>
  </defs>
  <!-- Product icon box -->
  <rect x="0" y="4" width="64" height="64" rx="8" fill="#008B9A12" stroke="#008B9A30" stroke-width="1"/>
  <g transform="translate(16, 20) scale(2)">
    <svg viewBox="0 0 32 32" width="32" height="32">
      <rect x="4" y="14" width="24" height="12" rx="2" stroke="#008B9A" stroke-width="1.4" fill="none"/>
      <circle cx="16" cy="20" r="4" stroke="#008B9A" stroke-width="1.2" fill="none"/>
      <circle cx="16" cy="20" r="1.3" fill="#008B9A"/>
      <line x1="16" y1="4" x2="16" y2="14" stroke="#008B9A" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="8" y1="4" x2="24" y2="4" stroke="#008B9A" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
      <line x1="4" y1="26" x2="4" y2="29" stroke="#008B9A" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>
      <line x1="28" y1="26" x2="28" y2="29" stroke="#008B9A" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>
    </svg>
  </g>
  <!-- Wordmark -->
  <text x="80" y="46"><tspan class="crane">crane</tspan><tspan class="iq">IQ</tspan></text>
  <text x="81" y="62" class="pname">Core</text>
  <!-- Accent line -->
  <line x1="80" y1="50" x2="310" y2="50" stroke="#008B9A" stroke-width="0.5" opacity="0.2"/>
</svg>