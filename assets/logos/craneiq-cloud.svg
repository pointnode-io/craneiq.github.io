      .crane{font-family:'Open Sans',sans-serif;font-weight:300;font-size:42px;fill:#c4d8e8;letter-spacing:-0.01em}
      .iq{font-family:'Open Sans',sans-serif;font-weight:600;font-size:42px;fill:#2299bb;letter-spacing:-0.01em}
      .pname{font-family:'Open Sans',sans-serif;font-weight:400;font-size:13px;fill:#2299bb;letter-spacing:0.06em;text-transform:uppercase}
    </style>
  </defs>
  <!-- Product icon box -->
  <rect x="0" y="4" width="64" height="64" rx="8" fill="#2299bb12" stroke="#2299bb30" stroke-width="1"/>
  <g transform="translate(16, 20) scale(2)">
    <svg viewBox="0 0 32 32" width="32" height="32">
      <path d="M22 22 H10 C7 22 5 20 5 17.5 C5 15 7 13 9.5 13 C9.2 12.4 9 11.7 9 11 C9 8.2 11.2 6 14 6 C16.3 6 18.2 7.5 18.8 9.5 C19.2 9.2 19.6 9 20 9 C22.2 9 24 10.8 24 13 C26.2 13.4 28 15.4 28 17.8 C28 20.2 26.2 22 24 22 Z" stroke="#2299bb" stroke-width="1.4" fill="none"/>
      <line x1="16" y1="24" x2="16" y2="29" stroke="#2299bb" stroke-width="1.3" stroke-linecap="round" opacity=".6"/>
      <line x1="12" y1="27" x2="20" y2="27" stroke="#2299bb" stroke-width="1.3" stroke-linecap="round" opacity=".5"/>
    </svg>
