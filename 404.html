<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>craneIQ — Page Not Found</title>
<link rel="icon" type="image/svg+xml" href="assets/logos/craneiq-monogram.svg">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--void:#020406;--hull:#07101a;--border:#162840;--brand:#008B9A;--mid:#628098;--steel:#92b0c4;--bright:#c4d8e8;--ff:'Open Sans',sans-serif;--mono:'Share Tech Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--void);color:var(--steel);font-family:var(--ff);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.wm{font-family:var(--ff);font-size:28px;line-height:1;letter-spacing:-.01em;margin-bottom:40px;text-decoration:none;display:block}
.wm .crane{font-weight:300;color:var(--bright)}
.wm .iq{font-weight:600;color:var(--brand)}
.code{font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--brand);text-transform:uppercase;margin-bottom:16px}
h1{font-family:var(--ff);font-weight:600;font-size:28px;color:var(--bright);margin-bottom:10px}
p{font-size:13px;color:var(--mid);line-height:1.75;max-width:360px;margin-bottom:32px}
a.btn{background:var(--brand);color:var(--void);font-family:var(--ff);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:12px 24px;border-radius:2px;text-decoration:none;transition:background .14s}
a.btn:hover{background:#00a8ba}
</style>
</head>
<body>
  <a href="/" class="wm"><span class="crane">crane</span><span class="iq">IQ</span></a>
  <div class="code">404 — Page Not Found</div>
  <h1>Nothing to lift here.</h1>
  <p>The page you're looking for doesn't exist. Head back to the craneIQ homepage to explore our products.</p>
  <a href="/" class="btn">Back to Homepage</a>
</body>
</html>
